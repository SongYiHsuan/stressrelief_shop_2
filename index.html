<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>解憂藥局｜會員管理系統</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #1f2933;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr;
    }

    .sidebar {
      background: #151719;
      color: #fff;
      padding: 22px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 26px;
      padding: 4px 6px;
    }

    .brand-title {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .brand-subtitle {
      color: #aab0b8;
      font-size: 13px;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav button {
      width: 100%;
      background: transparent;
      color: #cbd2da;
      text-align: left;
      padding: 13px 14px;
      border-radius: 14px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav button.active {
      background: #fff;
      color: #111;
    }

    .main {
      padding: 24px;
      max-width: 1280px;
      width: 100%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
    }

    .page-title {
      font-size: 30px;
      font-weight: 950;
      margin: 0;
    }

    .page-desc {
      color: #6b7280;
      margin-top: 6px;
      font-size: 14px;
    }

    .status-pill {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      padding: 10px 14px;
      color: #475569;
      font-weight: 800;
      white-space: nowrap;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.06);
      border: 1px solid #edf0f2;
    }

    .stat-label {
      color: #64748b;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 950;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
    }

    .panel {
      background: #fff;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.06);
      border: 1px solid #edf0f2;
      margin-bottom: 16px;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 950;
      margin: 0 0 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .form-row {
      display: grid;
      gap: 7px;
      margin-bottom: 12px;
    }

    label {
      color: #475569;
      font-size: 13px;
      font-weight: 900;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #d8dee6;
      background: #fff;
      border-radius: 13px;
      padding: 12px 13px;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.08);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .btn {
      background: #111;
      color: #fff;
      border-radius: 13px;
      padding: 12px 16px;
      font-weight: 950;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .btn.secondary {
      background: #eef2f7;
      color: #111;
    }

    .btn.warning {
      background: #b45309;
      color: #fff;
    }

    .btn.danger {
      background: #b91c1c;
      color: #fff;
    }

    .btn.green {
      background: #047857;
      color: #fff;
    }

    .table-wrap {
      width: 100%;
      overflow: auto;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: #fff;
    }

    th,
    td {
      padding: 13px 14px;
      border-bottom: 1px solid #eef0f2;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: #f8fafc;
      color: #475569;
      font-weight: 950;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .member-name {
      font-weight: 950;
    }

    .muted {
      color: #64748b;
      font-size: 13px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      background: #eef2f7;
      color: #334155;
      font-weight: 850;
      font-size: 12px;
      white-space: nowrap;
    }

    .tag.green {
      background: #dcfce7;
      color: #166534;
    }

    .tag.orange {
      background: #ffedd5;
      color: #9a3412;
    }

    .tag.red {
      background: #fee2e2;
      color: #991b1b;
    }

    .message {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #fff8d7;
      color: #6b4f00;
      white-space: pre-wrap;
      font-weight: 800;
      display: none;
    }

    .message.show {
      display: block;
    }

    .scanner-box {
      background: #0f172a;
      border-radius: 18px;
      overflow: hidden;
      min-height: 260px;
      display: grid;
      place-items: center;
      color: #fff;
      margin-bottom: 14px;
    }

    video {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      display: none;
    }

    video.active {
      display: block;
    }

    .scan-placeholder {
      padding: 24px;
      text-align: center;
      color: #cbd5e1;
      line-height: 1.7;
    }

    .member-card {
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(135deg, #fff7c2, #d2b85a 42%, #373126 100%);
      color: #111;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.16);
      margin-bottom: 14px;
    }

    .member-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    .member-card-title {
      font-size: 23px;
      font-weight: 950;
    }

    .member-card-points {
      background: rgba(0, 0, 0, 0.62);
      color: #ffe84d;
      padding: 9px 12px;
      border-radius: 999px;
      font-weight: 950;
    }

    .member-meta {
      display: grid;
      gap: 5px;
      color: #222;
      font-weight: 800;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        height: auto;
      }

      .nav {
        grid-template-columns: repeat(3, 1fr);
      }

      .nav button {
        justify-content: center;
        text-align: center;
        font-size: 13px;
        padding: 11px 8px;
      }

      .main {
        padding: 16px;
      }

      .cards {
        grid-template-columns: repeat(2, 1fr);
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    .scan-input-panel {
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .scan-input-title {
      font-size: 18px;
      font-weight: 950;
      margin-bottom: 6px;
    }

    .scan-input-desc {
      color: #64748b;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 14px;
      font-weight: 700;
    }

    .member-card.full {
      background: #fff;
      color: #111827;
      border: 1px solid #e5e7eb;
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.08);
    }

    .member-card.full .member-card-header {
      border-bottom: 1px solid #eef0f2;
      padding-bottom: 14px;
      margin-bottom: 14px;
    }

    .member-card.full .member-card-title {
      font-size: 26px;
      color: #111827;
    }

    .member-card.full .member-card-points {
      background: #047857;
      color: #fff;
      font-size: 20px;
      padding: 11px 16px;
    }

    .member-detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .member-detail-item {
      background: #f8fafc;
      border: 1px solid #eef0f2;
      border-radius: 14px;
      padding: 11px 12px;
    }

    .member-detail-label {
      color: #64748b;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 5px;
    }

    .member-detail-value {
      color: #111827;
      font-size: 15px;
      font-weight: 950;
      word-break: break-word;
    }

    .member-detail-value.big {
      font-size: 22px;
      color: #047857;
    }

    .scan-help-box {
      background: #ecfdf5;
      border: 1px solid #bbf7d0;
      color: #166534;
      border-radius: 14px;
      padding: 12px;
      font-weight: 850;
      line-height: 1.6;
      margin-top: 12px;
    }


    /* compact scan/member layout */
    .scan-input-panel {
      padding: 12px 14px !important;
      margin-bottom: 8px !important;
    }

    .scan-input-panel .form-row {
      margin-bottom: 8px !important;
    }

    .scan-input-panel input {
      padding: 9px 11px !important;
      border-radius: 10px !important;
      font-size: 15px !important;
    }

    .scan-input-panel .btn-row {
      margin-top: 6px !important;
    }

    .scan-input-panel .btn {
      padding: 9px 14px !important;
      border-radius: 11px !important;
    }

    .panel {
      padding: 14px !important;
      margin-bottom: 10px !important;
      border-radius: 16px !important;
    }

    .panel-title {
      font-size: 18px !important;
      margin-bottom: 10px !important;
    }

    .member-card.full {
      padding: 14px !important;
      margin-bottom: 0 !important;
      border-radius: 16px !important;
    }

    .member-card.full .member-card-header {
      padding-bottom: 10px !important;
      margin-bottom: 10px !important;
    }

    .member-card.full .member-card-title {
      font-size: 23px !important;
      line-height: 1.15 !important;
    }

    .member-card.full .muted {
      font-size: 12px !important;
      line-height: 1.35 !important;
    }

    .member-card.full .member-card-points {
      font-size: 18px !important;
      padding: 9px 14px !important;
    }

    .member-detail-grid {
      gap: 7px !important;
    }

    .member-detail-item {
      padding: 8px 10px !important;
      border-radius: 11px !important;
    }

    .member-detail-label {
      font-size: 11px !important;
      margin-bottom: 3px !important;
    }

    .member-detail-value {
      font-size: 14px !important;
      line-height: 1.25 !important;
    }

    .member-detail-value.big {
      font-size: 20px !important;
    }

    #scanMsg.message {
      display: none !important;
    }

    #walletMsg.message {
      margin-top: 8px !important;
      padding: 9px 10px !important;
      border-radius: 11px !important;
      font-size: 14px !important;
    }


    .query-loading {
      display: none;
      align-items: center;
      color: #64748b;
      font-size: 14px;
      font-weight: 900;
      padding: 9px 4px;
    }

    .query-loading.show {
      display: inline-flex;
    }


    /* LINE style broadcast editor */
    .line-editor-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) 360px;
      gap: 16px;
      align-items: start;
    }

    .message-type-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .message-type-tab {
      border: 1px solid #d8dee6;
      background: #fff;
      color: #334155;
      border-radius: 14px;
      padding: 14px 10px;
      font-weight: 950;
      text-align: center;
    }

    .message-type-tab.active {
      border-color: #06c755;
      background: #ecfdf5;
      color: #047857;
      box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.12);
    }

    .phone-preview-wrap {
      position: sticky;
      top: 18px;
    }

    .phone-preview {
      width: 320px;
      min-height: 620px;
      margin: 0 auto;
      background: #8fb3df;
      border: 12px solid #111;
      border-radius: 38px;
      overflow: hidden;
      box-shadow: 0 22px 50px rgba(15, 23, 42, 0.22);
    }

    .phone-preview-header {
      background: #f8fafc;
      padding: 14px 16px;
      font-weight: 950;
      color: #111827;
      border-bottom: 1px solid rgba(15, 23, 42, 0.08);
    }

    .phone-preview-body {
      padding: 18px 12px;
    }

    .line-bubble {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.14);
    }

    .line-bubble-img {
      width: 100%;
      height: 160px;
      background: #e5e7eb;
      display: grid;
      place-items: center;
      color: #64748b;
      font-weight: 900;
      overflow: hidden;
    }

    .line-bubble-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .line-bubble-content {
      padding: 14px;
    }

    .line-bubble-title {
      font-size: 18px;
      font-weight: 950;
      color: #111827;
      margin-bottom: 7px;
      line-height: 1.35;
    }

    .line-bubble-text {
      color: #475569;
      line-height: 1.55;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .line-bubble-button {
      margin-top: 12px;
      background: #06c755;
      color: #fff;
      text-align: center;
      border-radius: 999px;
      padding: 11px;
      font-weight: 950;
    }

    .preview-note {
      color: #64748b;
      font-size: 13px;
      line-height: 1.6;
      margin-top: 10px;
      text-align: center;
    }

    @media (max-width: 1100px) {
      .line-editor-grid {
        grid-template-columns: 1fr;
      }

      .phone-preview-wrap {
        position: static;
      }
    }

  
    .broadcast-filter-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px 24px;
      align-items: end;
    }

    @media (max-width: 720px) {
      .broadcast-filter-grid {
        grid-template-columns: 1fr;
      }
    }

  
    .topbar-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .admin-refresh-btn {
      background: #ffffff;
      color: #334155;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
      white-space: nowrap;
    }

    .admin-refresh-btn:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }

    .admin-refresh-btn:disabled {
      opacity: 0.68;
      cursor: not-allowed;
    }

    .admin-refresh-btn.is-loading .admin-refresh-icon {
      animation: adminSpin 0.9s linear infinite;
    }

    @keyframes adminSpin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 560px) {
      .topbar-actions {
        width: 100%;
        justify-content: space-between;
      }

      .admin-refresh-btn {
        padding: 9px 12px;
      }
    }

  

    /* ===== 會員完整資料編輯視窗 ===== */

    body.member-edit-open {
      overflow: hidden !important;
    }

    .member-edit-mask {
      position: fixed;
      inset: 0;
      z-index: 1000000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.64);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .member-edit-dialog {
      width: min(820px, 100%);
      max-height: calc(100vh - 48px);
      overflow: auto;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.45);
    }

    .member-edit-header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 22px;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid #e5e7eb;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .member-edit-title {
      margin: 0;
      color: #111827;
      font-size: 24px;
      font-weight: 950;
    }

    .member-edit-subtitle {
      margin-top: 5px;
      color: #64748b;
      font-size: 13px;
      line-height: 1.55;
      word-break: break-all;
    }

    .member-edit-close {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: #f1f5f9;
      color: #334155;
      font-size: 27px;
      font-weight: 700;
    }

    .member-edit-body {
      padding: 20px 22px 6px;
    }

    .member-edit-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .member-edit-grid .form-row {
      margin-bottom: 0;
    }

    .member-edit-full {
      grid-column: 1 / -1;
    }

    .member-edit-readonly {
      background: #f1f5f9 !important;
      color: #64748b !important;
      cursor: not-allowed;
    }

    .member-edit-money {
      position: relative;
    }

    .member-edit-money::before {
      content: "$";
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 2;
      color: #64748b;
      font-weight: 900;
    }

    .member-edit-money input {
      padding-left: 30px;
    }

    .member-edit-hint {
      margin-top: 5px;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.55;
    }

    .member-edit-warning {
      grid-column: 1 / -1;
      padding: 12px 14px;
      border: 1px solid #fde68a;
      border-radius: 13px;
      background: #fffbeb;
      color: #92400e;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.6;
    }

    .member-edit-message {
      display: none;
      margin: 16px 22px 0;
      padding: 12px 14px;
      border-radius: 13px;
      background: #fee2e2;
      color: #991b1b;
      font-weight: 850;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .member-edit-message.show {
      display: block;
    }

    .member-edit-actions {
      position: sticky;
      bottom: 0;
      z-index: 5;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 18px 22px 20px;
      background: rgba(255, 255, 255, 0.97);
      border-top: 1px solid #e5e7eb;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .member-edit-btn {
      min-width: 108px;
      padding: 12px 18px;
      border-radius: 13px;
      font-weight: 950;
    }

    .member-edit-btn.cancel {
      background: #eef2f7;
      color: #334155;
    }

    .member-edit-btn.save {
      background: #111827;
      color: #ffffff;
    }

    .member-edit-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .member-table-edit-btn {
      padding: 8px 13px;
      border-radius: 11px;
      background: #111827;
      color: #ffffff;
      font-size: 13px;
      font-weight: 950;
      white-space: nowrap;
    }

    .member-table-edit-btn:hover {
      background: #334155;
    }

    @media (max-width: 720px) {
      .member-edit-mask {
        padding: 0;
        align-items: flex-end;
      }

      .member-edit-dialog {
        width: 100%;
        max-height: 94vh;
        border-radius: 22px 22px 0 0;
      }

      .member-edit-grid {

    function escapeHtml(value) {

        .replaceAll('&', '&amp;')

    /**
     * 統一台灣電話格式，避免試算表將第一個 0 吃掉。
     *
     * 973113721      -> 0973113721
     * 886973113721   -> 0973113721
     * +886973113721  -> 0973113721
     * 0973113721.0   -> 0973113721
     */
    function normalizeTaiwanPhone(value) {
      if (
        value === undefined ||
        value === null
      ) {
        return '';
      }

      let raw = String(value).trim();

      if (!raw) {
        return '';
      }

      // Excel／Google Sheet 數值可能出現 .0
      raw = raw.replace(/\.0+$/, '');

      // 只保留數字
      let digits = raw.replace(/\D/g, '');

      if (!digits) {
        return '';
      }

      // +8869xxxxxxxx／8869xxxxxxxx
      if (
        digits.startsWith('886') &&
        digits.length >= 11
      ) {
        digits = '0' + digits.slice(3);
      }

      // 手機號碼被吃掉開頭 0
      if (
        digits.length === 9 &&
        digits.startsWith('9')
      ) {
        digits = '0' + digits;
      }

      return digits;
    }

    function normalizeMemberPhone(member) {
      if (
        !member ||
        typeof member !== 'object'
      ) {
        return member;
      }

      return {
        ...member,
        phone: normalizeTaiwanPhone(
          member.phone
        ),
      };
    }

    function normalizeMemberList(list) {
      return Array.isArray(list)

    function getNowText() {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      return (
        d.getFullYear() +
        '/' +
        pad(d.getMonth() + 1) +
        '/' +
        pad(d.getDate()) +
        ' ' +
        pad(d.getHours()) +
        ':' +
        pad(d.getMinutes())
      );
    }

    function formatAdminDateTime(value) {
      const raw = String(value ?? '').trim();

      if (!raw) return '';

      let d = null;

      // Google Apps Script / Sheet 常見 ISO：2026-07-10T12:40:08.000Z
      if (raw.includes('T')) {
        const parsed = new Date(raw);

        if (!Number.isNaN(parsed.getTime())) {
          d = parsed;
        }
      }

      // 一般文字：2026/07/10 18:00:00 或 2026-07-10 18:00:00
      if (!d) {
        const normalized = raw.replace(/-/g, '/');
        const parsed = new Date(normalized);

        if (!Number.isNaN(parsed.getTime())) {
          d = parsed;
        }
      }

      if (!d) {
        return raw
          .replace(/-/g, '/')
          .replace('T', ' ')
          .replace('.000Z', '')
          .slice(0, 16);
      }

      const y = d.getFullYear();
      const m = d.getMonth() + 1;
      const day = d.getDate();
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');

      return `${y}/${m}/${day} ${hh}:${mm}`;
    }

    function formatAdminDate(value) {
      const text = formatAdminDateTime(value);

      if (!text) return '';

      return text.split(' ')[0];
    }


    function firestoreValueToPlain(value) {
      if (value === null || value === undefined) {
        return value;
      }

      if (
        value &&
        typeof value.toDate === 'function'
      ) {
        return value.toDate().toISOString();
      }

      if (Array.isArray(value)) {
        return value.map(firestoreValueToPlain);
      }

      if (
        typeof value === 'object' &&
        value.constructor === Object
      ) {
        const result = {};

        Object.entries(value).forEach(([key, item]) => {
          result[key] = firestoreValueToPlain(item);
        });

        return result;
      }

      return value;
    }

    function firestoreDocToPlain(doc) {
      return {

    async function getFirestoreCollectionRows(
      collectionName,
      orderField = '',
      direction = 'desc'
    ) {
      let query = firebaseDb.collection(collectionName);

      if (orderField) {
        query = query.orderBy(orderField, direction);
      }

      const snapshot = await query.get();

      return snapshot.docs.map(firestoreDocToPlain);
    }

            );
          }

          const located =

              currentData.displayName ||
              '',

            action:
              'updateMemberTags',

              tags:
                currentData.tags || '',

              tags,

            operatorUid:
              adminUser.uid || '',

            operatorEmail:
              adminUser.email || '',

            storeName,

            createdAt: now,

          return {
            member: {
              ...currentData,
              tags,

        case 'previewBroadcast': {
          const members =

              .trim()

            Number(

            String(

            ).trim();

          const hasStoredValue =
            String(

            ).trim();

            String(

            ).trim();

          const filteredMembers =
            members.filter((member) => {
              /*
               * 會員等級
               */
              if (
                level &&
                String(member.level || '') !==
                  level
              ) {
                return false;
              }

              /*
               * 會員標籤
               */
              if (tag) {
                const memberTags =
                  String(member.tags || '')
                    .split(',')
                    .map((item) =>
                      item.trim().toLowerCase()
                    )
                    .filter(Boolean);

                if (
                  !memberTags.includes(tag)
                ) {
                  return false;
                }
              }

              /*
               * 最低儲值金
               */
              const storedValue =
                Number(
                  member.storedValue || 0
                );

              if (
                Number.isFinite(
                  minStoredValue
                ) &&
                minStoredValue > 0 &&
                storedValue <
                  minStoredValue
              ) {
                return false;
              }

              /*
               * 儲值金條件
               */
              if (
                hasStoredValue === 'yes' &&
                storedValue <= 0
              ) {
                return false;
              }

              if (
                hasStoredValue === 'no' &&
                storedValue > 0
              ) {
                return false;
              }

              /*
               * 此日期後加入
               */
              if (joinedAfterDate) {
                const createdAt =
                  String(
                    member.createdAt || ''
                  ).trim();

                if (!createdAt) {
                  return false;
                }

                const createdDate =
                  createdAt.slice(0, 10);

                if (
                  createdDate <
                  joinedAfterDate
                ) {
                  return false;
                }
              }

              return true;
            });

          const previewId =
            'preview_' +
            Date.now() +
            '_' +
            Math.random()
              .toString(36)
              .slice(2, 10);

          return {
            previewId,
            count:
              filteredMembers.length,
            members:
              filteredMembers,
          };

          const members =
            await getAdminMembersFromFirestore();

          const member = members.find((item) => {

              item.memberId,
              item.barcodeValue,
              item.phone,
              item.displayName,
            ].map((value) =>
              String(value || '').toLowerCase()
            );

            return (
              values[0] === keyword ||
              values[1] === keyword ||
              values[2] === keyword ||
              values[3].includes(keyword)
            );
          });

          if (!member) {
            throw new Error('找不到會員');
          }

          return {
            member,
          };
        }

        case 'sendBroadcast': {
          if (!firebaseAuth.currentUser) {
            throw new Error(
              '請先登入後台'

          const callable =
            firebaseFunctions
              .httpsCallable(

              error

            const message =
              error?.details ||
              error?.message ||
              String(error);

            throw new Error(message);
          }
        }

        default:
          throw new Error(
            action +
            ' 尚未切換至 Firebase，為避免誤改資料已停止執行'

    /**

     * 使用 Firestore Transaction，確保：
     * 1. 會員儲值金更新
     * 2. walletLogs 紀錄新增
     * 兩者同時成功或同時失敗。
     */
    async function firebaseAdjustStoredValue(payload = {}) {
      const user = firebaseAuth.currentUser;

      if (!user) {
        throw new Error('請先登入新版後台');
      }

      if (!state.adminProfile) {
        throw new Error('尚未取得新版後台管理員權限');
      }

      const amount = Number(payload.amount || 0);

      if (!Number.isFinite(amount) || amount === 0) {
        throw new Error('儲值金異動金額不可為 0');
      }

      const selectedMember =
        state.selectedMember || {};

      const memberId = String(
        payload.memberId ||
        selectedMember.memberId ||
        ''
      ).trim();

      const barcodeValue = String(
        payload.barcodeValue ||
        selectedMember.barcodeValue ||
        ''
      ).trim();

      const directDocumentId = String(
        selectedMember.lineUserId ||
        selectedMember.documentId ||
        selectedMember.firebaseDocumentId ||
        selectedMember.uid ||
        ''
      ).trim();

      let memberRef = null;

      /*
       * 新版資料庫文件編號原則上就是 lineUserId，
       * 能直接定位時優先直接讀取。
       */
      if (directDocumentId) {
        const directRef = firebaseDb
          .collection('members')
          .doc(directDocumentId);

        const directSnapshot =
          await directRef.get();

        if (directSnapshot.exists) {
          memberRef = directRef;
        }
      }

      /*
       * 找不到文件 ID 時，以 memberId 查詢。
       */
      if (!memberRef && memberId) {
        const memberIdSnapshot =
          await firebaseDb
            .collection('members')
            .where('memberId', '==', memberId)
            .limit(2)
            .get();

        if (memberIdSnapshot.size > 1) {
          throw new Error(
            'Firebase 中有重複會員編號，已停止儲值'
          );
        }

        if (!memberIdSnapshot.empty) {
          memberRef =
            memberIdSnapshot.docs[0].ref;
        }
      }

      /*
       * 最後才使用條碼查詢。
       */
      if (!memberRef && barcodeValue) {
        const barcodeSnapshot =
          await firebaseDb
            .collection('members')
            .where(
              'barcodeValue',
              '==',
              barcodeValue
            )
            .limit(2)
            .get();

        if (barcodeSnapshot.size > 1) {
          throw new Error(
            'Firebase 中有重複會員條碼，已停止儲值'
          );
        }

        if (!barcodeSnapshot.empty) {
          memberRef =
            barcodeSnapshot.docs[0].ref;
        }
      }

      if (!memberRef) {
        throw new Error(
          '新版 Firebase 找不到這位會員'
        );
      }

      const walletLogRef =
        firebaseDb
          .collection('walletLogs')
          .doc();

      const serverTimestamp =
        firebase.firestore.FieldValue
          .serverTimestamp();

      let updatedMember = null;
      let createdLog = null;

      await firebaseDb.runTransaction(
        async (transaction) => {
          const memberSnapshot =
            await transaction.get(memberRef);

          if (!memberSnapshot.exists) {
            throw new Error(
              '會員資料已不存在，請重新查詢'
            );
          }

          const member =
            memberSnapshot.data() || {};

          const beforeStoredValue =
            Number(member.storedValue || 0);

          const afterStoredValue =
            beforeStoredValue + amount;

          if (
            !Number.isFinite(afterStoredValue)
          ) {
            throw new Error(
              '儲值金計算結果錯誤'
            );
          }

          if (afterStoredValue < 0) {
            throw new Error(
              '會員儲值金不足，無法扣除'
            );
          }

          const displayName =
            member.displayName ||
            selectedMember.displayName ||
            '';

          const finalMemberId =
            member.memberId ||
            memberId ||
            '';

          const finalBarcodeValue =
            member.barcodeValue ||
            barcodeValue ||
            '';

          const lineUserId =
            member.lineUserId ||
            memberRef.id;

          const type =
            amount >= 0
              ? '儲值'
              : '使用';

          transaction.update(
            memberRef,
            {
              storedValue:
                afterStoredValue,

              updatedAt:
                serverTimestamp,

              lastVisitAt:
                serverTimestamp,

              updatedBy:
                user.uid,

              updatedByEmail:
                user.email || '',
            }
          );

          createdLog = {
            logId:
              walletLogRef.id,

            memberDocumentId:
              memberRef.id,

            lineUserId,

            memberId:
              finalMemberId,

            barcodeValue:
              finalBarcodeValue,

            displayName,

            type,

            amount,

            beforeStoredValue,

            afterStoredValue,

            payMethod:
              String(
                payload.payMethod || ''
              ).trim(),

            note:
              String(
                payload.note || ''
              ).trim(),

            staff:
              String(
                payload.staff ||
                user.email ||
                ''
              ).trim(),

            operatorUid:
              user.uid,

            operatorEmail:
              user.email || '',

            storeName:
              state.adminProfile.storeName ||
              '',

            createdAt:
              serverTimestamp,
          };

          transaction.set(
            walletLogRef,
            createdLog
          );

          updatedMember = {
            ...member,

            documentId:
              memberRef.id,

            lineUserId,

            memberId:
              finalMemberId,

            barcodeValue:
              finalBarcodeValue,

            displayName,

            storedValue:
              afterStoredValue,
          };
        }
      );

      /*
       * 讓前台表格與已選會員立即更新，
       * 不需要等待下一次重新整理。
       */
      state.members = (
        state.members || []
      ).map((member) => {
        const sameDocument =
          String(
            member.lineUserId ||
            member.documentId ||
            ''
          ) ===
          String(
            updatedMember.lineUserId ||
            updatedMember.documentId ||
            ''
          );

        const sameMemberId =
          memberId &&
          String(member.memberId || '') ===
          String(updatedMember.memberId || '');

        return sameDocument || sameMemberId
          ? {
              ...member,
              ...updatedMember,
            }
          : member;
      });

      state.walletLogs = [
        {
          ...createdLog,
          createdAt:
            getNowText(),
        },
        ...(state.walletLogs || []),
      ];

      return {
        member:
          updatedMember,

        log: {
          ...createdLog,
          createdAt:
            getNowText(),
        },
      };
    }


    async function api(action, payload = {}) {
      /*
       * 新版後台儲值金操作直接使用新版 Firebase。
       * 不送舊 GAS，也不接觸舊 Firebase。
       */
      if (action === 'adjustStoredValue') {
        return await firebaseAdjustStoredValue(
          payload
        );
      }

      try {
        return await firebaseApi(action, payload);
      } catch (err) {
        console.error(
          'Firebase API failed:',
          action,
          err
        );

        throw err;
      }
    }

    async function mockApi(action, payload) {
      await new Promise((resolve) => setTimeout(resolve, 250));

      if (action === 'getDashboard') {
        return {
          members: demoMembers,
          pointLogs: demoPointLogs,
          walletLogs: demoWalletLogs,
        };
      }

      if (action === 'getMembers') {
        return {
          members: demoMembers,
        };
      }

      if (action === 'getLogs') {
        return {
          pointLogs: demoPointLogs,
          walletLogs: demoWalletLogs,
        };
      }

      if (action === 'findMember') {
        const keyword = String(payload.keyword || '').trim().toLowerCase();
        const found = demoMembers.find((m) => {
          return (
            String(m.memberId).toLowerCase() === keyword ||
            String(m.barcodeValue).toLowerCase() === keyword ||
            String(m.phone).toLowerCase() === keyword ||
            String(m.displayName).toLowerCase().includes(keyword)
          );
        });

        if (!found) {
          throw new Error('找不到會員');
        }

        return {
          member: found,
        };
      }

      if (action === 'adjustPoints') {
        const member = state.selectedMember || demoMembers[0];
        const amount = Number(payload.points || 0);
        const before = Number(member.points || 0);
        member.points = before + amount;

        const log = {
          logId: 'P' + Date.now(),
          memberId: member.memberId,
          displayName: member.displayName,
          type: amount >= 0 ? '儲值' : '使用',
          points: amount,
          beforePoints: before,
          afterPoints: member.points,
          note: payload.note || '',
          staff: payload.staff || '',
          createdAt: getNowText(),
        };

        demoPointLogs.unshift(log);

        return {
          member,
          log,
        };
      }

      if (action === 'adjustStoredValue') {
        const member = state.selectedMember || demoMembers[0];
        const amount = Number(payload.amount || 0);
        const before = Number(member.storedValue || 0);
        member.storedValue = before + amount;

        const log = {
          logId: 'W' + Date.now(),
          memberId: member.memberId,
          displayName: member.displayName,
          type: amount >= 0 ? '儲值' : '使用',
          amount,
          beforeStoredValue: before,
          afterStoredValue: member.storedValue,
          payMethod: payload.payMethod || '',
          note: payload.note || '',
          staff: payload.staff || '',
          createdAt: getNowText(),
        };

        demoWalletLogs.unshift(log);

        return {
          member,
          log,
        };
      }

      if (action === 'previewBroadcast') {
        return {
          count: filterMembersByPayload(payload).length,
          members: filterMembersByPayload(payload),
        };
      }

      if (action === 'sendBroadcast') {
        return {
          sentCount: filterMembersByPayload(payload).length,
        };
      }

      return {};
    }

    function filterMembersByPayload(payload) {
      let list = [...demoMembers];

      const minPoints = Number(payload.minPoints || 0);
      const joinedAfterDate = String(payload.joinedAfterDate || '').trim();
      const level = String(payload.level || '').trim();
      const tag = String(payload.tag || '').trim().toLowerCase();
      const hasStoredValue = String(payload.hasStoredValue || '');

      if (minPoints > 0) {
        list = list.filter((m) => Number(m.points || 0) >= minPoints);
      }

      if (joinedAfterDate) {
        list = list.filter((m) => {
          const rawCreatedAt = String(m.createdAt || '').trim();

          if (!rawCreatedAt) {
            return false;
          }

          const match = rawCreatedAt.match(
            /^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/
          );

          if (!match) {
            return false;
          }

          const memberDate =
            match[1] +
            '-' +
            String(match[2]).padStart(2, '0') +
            '-' +
            String(match[3]).padStart(2, '0');

          return memberDate >= joinedAfterDate;
        });
      }

      if (level) {
        list = list.filter((m) => String(m.level || '') === level);
      }

      if (tag) {
        list = list.filter((m) => String(m.tags || '').toLowerCase().includes(tag));
      }

      if (hasStoredValue === 'yes') {
        list = list.filter((m) => Number(m.storedValue || 0) > 0);
      }

      if (hasStoredValue === 'no') {
        list = list.filter((m) => Number(m.storedValue || 0) <= 0);
      }

      return list;
    }

    function withTimeout(promise, ms, message) {
      let timer;

      const timeout = new Promise((_, reject) => {
        timer = window.setTimeout(() => {
          reject(new Error(message || '連線逾時，請稍後再試'));
        }, ms);
      });

      return Promise.race([promise, timeout]).finally(() => {
        window.clearTimeout(timer);
      });
    }

    function renderAdminLoginPage(message = '') {
      document.body.classList.remove('modal-open');

      removeAdminLoginPage();

      const loginPage = document.createElement('div');
      loginPage.id = 'adminLoginPage';
      loginPage.className = 'admin-login-page';

      loginPage.innerHTML = `
        <form class="admin-login-card" id="adminLoginForm">
          <h1>解憂藥局後台登入</h1>

          <label for="adminEmail">帳號 Email</label>
          <input id="adminEmail" type="email" autocomplete="username" placeholder="xxx@gmail.com" required />

          <label for="adminPassword">密碼</label>
          <input id="adminPassword" type="password" autocomplete="current-password" placeholder="請輸入密碼" required />

          <button id="adminLoginBtn" type="submit">登入後台</button>

          <div class="admin-login-error" id="adminLoginError">${escapeHtml(message)}</div>
        </form>
      `;

      document.body.appendChild(loginPage);

      const form = document.getElementById('adminLoginForm');
      const btn = document.getElementById('adminLoginBtn');
      const error = document.getElementById('adminLoginError');

      form.onsubmit = async (event) => {
        event.preventDefault();

        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value;

        error.textContent = '';
        btn.disabled = true;
        btn.textContent = '登入中...';

        try {
          if (!email || !password) {
            throw new Error('請輸入帳號與密碼');
          }

          await firebaseAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

          const credential = await withTimeout(
            firebaseAuth.signInWithEmailAndPassword(email, password),
            12000,
            'Firebase 登入逾時。請確認 Email/Password 登入已啟用，且 GitHub Pages 網域已加入 Firebase Authorized domains。'
          );

          const user = credential.user || firebaseAuth.currentUser;

          if (!user) {
            throw new Error('登入成功但無法取得使用者資料');
          }

          state.authReady = true;
          state.adminUser = user;
          state.adminProfile = await withTimeout(
            loadAdminProfile(user),
            12000,
            '已登入，但讀取 Firestore 後台權限逾時。請確認 adminUsers/' + user.uid + ' 已建立，且 Firestore Rules 允許讀取。'
          );

          removeAdminLoginPage();
          renderAdminAuthBadge();

          if (typeof loadAll === 'function') {
            await loadAll();
          }

          render();
        } catch (err) {
          console.error(err);

          try {
            await firebaseAuth.signOut();
          } catch (signOutErr) {
            console.warn(signOutErr);
          }

          state.authReady = true;
          state.adminUser = null;
          state.adminProfile = null;

          error.textContent = toChineseFirebaseError(err);
          btn.disabled = false;
          btn.textContent = '登入後台';
        }
      };
    }

    function toChineseFirebaseError(err) {
      const code = String((err && err.code) || '');

      if (code.includes('invalid-credential') || code.includes('wrong-password')) {
        return '帳號或密碼錯誤';
      }

      if (code.includes('user-not-found')) {
        return '找不到此後台帳號';
      }

      if (code.includes('too-many-requests')) {
        return '嘗試次數過多，請稍後再試';
      }

      return (err && err.message) || '登入失敗，請稍後再試';
    }

    async function loadAdminProfile(user) {
      const doc = await firebaseDb.collection('admins').doc(user.uid).get();

      if (!doc.exists) {
        throw new Error('此帳號尚未建立後台權限：admins/' + user.uid);
      }

      const profile = doc.data() || {};

      if (profile.active !== true) {
        throw new Error('此後台帳號尚未啟用');
      }

      if (!profile.storeName) {
        profile.storeName = '解憂藥局';
      }

      return {
        uid: user.uid,
        email: user.email || profile.email || '',
        storeName: profile.storeName || '',
        role: profile.role || 'staff',
        displayName: profile.displayName || '',
      };
    }

    function initAdminAuth() {
      let finished = false;

      window.setTimeout(() => {
        if (finished) {
          return;
        }

        finished = true;
        state.authReady = true;
        state.adminUser = null;
        state.adminProfile = null;
        renderAdminLoginPage();
      }, 1500);

      firebaseAuth.onAuthStateChanged(async (user) => {
        if (finished && !user) {
          return;
        }

        finished = true;
        state.authReady = true;
        state.adminUser = user || null;
        state.adminProfile = null;

        if (!user) {
          renderAdminLoginPage();
          return;
        }

        try {
          state.adminProfile = await loadAdminProfile(user);
          removeAdminLoginPage();
          renderAdminAuthBadge();

          if (typeof loadAll === 'function') {
            await loadAll();
          }

          render();
        } catch (err) {
          console.error(err);
          await firebaseAuth.signOut();
          renderAdminLoginPage(err.message || String(err));
        }
      });
    }

    const dashboardState = {

      endDate: '',
    };

    function dashboardPad(value) {
      return String(value).padStart(2, '0');
    }

    function dashboardDateValue(date) {
      return (
        date.getFullYear() +
        '-' +
        dashboardPad(date.getMonth() + 1) +
        '-' +
        dashboardPad(date.getDate())
      );
    }

    function dashboardParseDate(value) {
      if (!value) {
        return null;
      }

      if (value instanceof Date) {
        return Number.isNaN(value.getTime())
          ? null
          : value;
      }

      if (
        value &&
        typeof value.toDate === 'function'
      ) {
        const result = value.toDate();

        return Number.isNaN(result.getTime())
          ? null
          : result;
      }

      if (
        value &&
        typeof value.seconds === 'number'
      ) {
        const result =
          new Date(value.seconds * 1000);

        return Number.isNaN(result.getTime())
          ? null
          : result;
      }

      const raw =
        String(value).trim();

      if (!raw) {
        return null;
      }

      const timestampMatch = raw.match(
        /^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})(?:\s+|T)?(\d{1,2})?:?(\d{1,2})?:?(\d{1,2})?/
      );

      if (timestampMatch) {
        const result = new Date(
          Number(timestampMatch[1]),
          Number(timestampMatch[2]) - 1,
          Number(timestampMatch[3]),
          Number(timestampMatch[4] || 0),
          Number(timestampMatch[5] || 0),
          Number(timestampMatch[6] || 0)
        );

        return Number.isNaN(result.getTime())
          ? null
          : result;
      }

      const result = new Date(raw);

      return Number.isNaN(result.getTime())
        ? null
        : result;
    }

    function dashboardStartOfDay(date) {
      return new Date(
        date.getFullYear(),
        date.getMonth(),
        date.getDate(),
        0,
        0,
        0,
        0
      );
    }

    function dashboardEndOfDay(date) {
      return new Date(
        date.getFullYear(),
        date.getMonth(),
        date.getDate(),
        23,
        59,
        59,
        999
      );
    }

    function setDashboardDateRange(type) {
      const now = new Date();

      let start =
        dashboardStartOfDay(now);

      let end =
        dashboardEndOfDay(now);

      if (type === 'yesterday') {
        start.setDate(
          start.getDate() - 1
        );

        end =
          dashboardEndOfDay(start);
      }

      if (type === '7d') {
        start.setDate(
          start.getDate() - 6
        );
      }

      if (type === '30d') {
        start.setDate(
          start.getDate() - 29
        );
      }

      if (type === 'month') {
        start = new Date(
          now.getFullYear(),
          now.getMonth(),
          1
        );

        end = new Date(
          now.getFullYear(),
          now.getMonth() + 1,
          0,
          23,
          59,
          59,
          999
        );
      }

      if (type === 'lastMonth') {
        start = new Date(
          now.getFullYear(),
          now.getMonth() - 1,
          1
        );

        end = new Date(
          now.getFullYear(),
          now.getMonth(),
          0,
          23,
          59,
          59,
          999
        );
      }

      dashboardState.range = type;
      dashboardState.startDate =
        dashboardDateValue(start);

      dashboardState.endDate =
        dashboardDateValue(end);
    }

    function dashboardIsUsage(log) {
      const type =
        String(log.type || '').trim();

      const amount =
        Number(log.amount || 0);

      return (
        amount < 0 ||
        type.includes('使用') ||
        type.includes('扣款') ||
        type.includes('消費')
      );
    }

    function dashboardMoney(value) {
      return '$' + money(
        Math.round(Number(value || 0))
      );
    }

    function dashboardCalculate() {
      if (
        !dashboardState.startDate ||
        !dashboardState.endDate
      ) {
        setDashboardDateRange('month');
      }

      const start =
        dashboardStartOfDay(
          new Date(
            dashboardState.startDate +
            'T00:00:00'
          )
        );

      const end =
        dashboardEndOfDay(
          new Date(
            dashboardState.endDate +
            'T00:00:00'
          )
        );

      const members =
        state.members || [];

      const allLogs =
        state.walletLogs || [];

      const logs = allLogs
        .map((log) => ({
          ...log,
          dashboardDate:
            dashboardParseDate(
              log.createdAt
            ),
        }))
        .filter((log) => {
          return (
            log.dashboardDate &&
            log.dashboardDate >= start &&
            log.dashboardDate <= end
          );
        });

      const depositLogs =
        logs.filter(
          (log) => !dashboardIsUsage(log)
        );

      const usageLogs =
        logs.filter(dashboardIsUsage);

      const depositTotal =
        depositLogs.reduce(
          (sum, log) => {
            return sum +
              Math.abs(
                Number(log.amount || 0)
              );
          },
          0
        );

      const usageTotal =
        usageLogs.reduce(
          (sum, log) => {
            return sum +
              Math.abs(
                Number(log.amount || 0)
              );
          },
          0
        );

      const currentBalance =
        members.reduce(
          (sum, member) => {
            return sum +
              Number(
                member.storedValue || 0
              );
          },
          0
        );

      const totalSpend =
        members.reduce(
          (sum, member) => {
            return sum +
              Number(
                member.totalSpend || 0
              );
          },
          0
        );

      const newMembers =
        members.filter((member) => {
          const createdAt =
            dashboardParseDate(
              member.createdAt
            );

          return (
            createdAt &&
            createdAt >= start &&
            createdAt <= end
          );
        });

      const activeMembers =
        new Set(
          logs
            .map((log) => {
              return String(
                log.memberId ||
                log.memberDocumentId ||
                ''
              );
            })
            .filter(Boolean)
        );

      const memberMap =
        new Map();

      logs.forEach((log) => {
        const memberId =
          String(
            log.memberId ||
            log.memberDocumentId ||
            '未知會員'
          );

        const current =
          memberMap.get(memberId) || {
            memberId,
            displayName:
              log.displayName ||
              memberId,
            deposit: 0,
            usage: 0,
            count: 0,
          };

        const amount =
          Math.abs(
            Number(log.amount || 0)
          );

        if (dashboardIsUsage(log)) {
          current.usage += amount;
        } else {
          current.deposit += amount;
        }

        current.count += 1;

        if (log.displayName) {
          current.displayName =
            log.displayName;
        }

        memberMap.set(
          memberId,
          current
        );
      });

      const memberRows =
        Array.from(
          memberMap.values()
        );

      const topDeposits =
        [...memberRows]
          .filter(
            (item) => item.deposit > 0
          )
          .sort(
            (a, b) =>
              b.deposit - a.deposit
          )
          .slice(0, 10);

      const topUsages =
        [...memberRows]
          .filter(
            (item) => item.usage > 0
          )
          .sort(
            (a, b) =>
              b.usage - a.usage
          )
          .slice(0, 10);

      const topBalances =
        [...members]
          .sort((a, b) => {
            return (
              Number(
                b.storedValue || 0
              ) -
              Number(
                a.storedValue || 0
              )
            );
          })
          .slice(0, 10);

      const storeMap =
        new Map();

      logs.forEach((log) => {
        const storeName =
          String(
            log.storeName ||
            '未記錄店別'
          ).trim() ||
          '未記錄店別';

        const current =
          storeMap.get(storeName) || {
            storeName,
            deposit: 0,
            usage: 0,
            count: 0,
          };

        const amount =
          Math.abs(
            Number(log.amount || 0)
          );

        if (dashboardIsUsage(log)) {
          current.usage += amount;
        } else {
          current.deposit += amount;
        }

        current.count += 1;

        storeMap.set(
          storeName,
          current
        );
      });

      const stores =
        Array.from(
          storeMap.values()
        )
          .map((item) => ({
            ...item,
            net:
              item.deposit -
              item.usage,
          }))
          .sort((a, b) => {
            return (
              b.deposit -
              a.deposit
            );
          });

      const negativeMembers =
        members.filter((member) => {
          return (
            Number(
              member.storedValue || 0
            ) < 0
          );
        });

      const largeLogs =
        logs.filter((log) => {
          return (
            Math.abs(
              Number(log.amount || 0)
            ) >= 5000
          );
        });

      const missingStoreLogs =
        logs.filter(
          (log) => !log.storeName
        );

      const missingOperatorLogs =
        logs.filter((log) => {
          return !(
            log.operatorEmail ||
            log.staff
          );
        });

      const brokenBalanceLogs =
        logs.filter((log) => {
          const before =
            Number(
              log.beforeStoredValue
            );

          const after =
            Number(
              log.afterStoredValue
            );

          const amount =
            Number(log.amount);

          if (
            !Number.isFinite(before) ||
            !Number.isFinite(after) ||
            !Number.isFinite(amount)
          ) {
            return false;
          }

          return (
            Math.abs(
              before +
              amount -
              after
            ) > 1
          );
        });

      return {
        members,
        logs,
        depositLogs,
        usageLogs,
        depositTotal,
        usageTotal,
        currentBalance,
        totalSpend,
        newMembers,
        activeMembers,
        topDeposits,
        topUsages,
        topBalances,
        stores,
        negativeMembers,
        largeLogs,
        missingStoreLogs,
        missingOperatorLogs,
        brokenBalanceLogs,
      };
    }

    function exportDashboardCsv(
      metrics
    ) {
      const rows = [
        [
          '時間',
          '會員名稱',
          '會員編號',
          '類型',
          '金額',
          '異動前',
          '異動後',
          '付款方式',
          '操作人員',
          '店別',
          '備註',
        ],
        ...metrics.logs.map(
          (log) => [
            formatAdminDateTime(
              log.createdAt
            ) || '',
            log.displayName || '',
            log.memberId || '',
            log.type || '',
            log.amount || 0,
            log.beforeStoredValue ?? '',
            log.afterStoredValue ?? '',
            log.payMethod || '',
            log.operatorEmail ||
              log.staff ||
              '',
            log.storeName || '',
            log.note || '',
          ]
        ),
      ];

      const csv =
        '\ufeff' +
        rows
          .map((row) => {
            return row
              .map((value) => {
                return (
                  '"' +
                  String(value ?? '')
                    .replace(
                      /"/g,
                      '""'
                    ) +
                  '"'
                );
              })
              .join(',');
          })
          .join('\n');

      const blob =
        new Blob(
          [csv],
          {
            type:
              'text/csv;charset=utf-8',
          }
        );

      const url =
        URL.createObjectURL(blob);

      const link =
        document.createElement('a');

      link.href = url;

      link.download =
        '營運戰情室_' +
        dashboardState.startDate +
        '_' +
        dashboardState.endDate +
        '.csv';

      document.body.appendChild(
        link
      );

      link.click();
      link.remove();

      URL.revokeObjectURL(url);
    }

    function dashboardEscapeAttr(value) {

    function dashboardBuildTrend(metrics) {
      const rows = new Map();
      const start = new Date(dashboardState.startDate + 'T00:00:00');
      const end = new Date(dashboardState.endDate + 'T00:00:00');

      for (let cursor = new Date(start); cursor <= end; cursor.setDate(cursor.getDate() + 1)) {
        const key = dashboardDateValue(cursor);
        rows.set(key, { key, label: `${cursor.getMonth() + 1}/${cursor.getDate()}`, deposit: 0, usage: 0 });
      }

      (metrics.logs || []).forEach((log) => {
        const date = log.dashboardDate || dashboardParseDate(log.createdAt);
        if (!date) return;
        const key = dashboardDateValue(date);
        if (!rows.has(key)) return;
        const item = rows.get(key);
        const amount = Math.abs(Number(log.amount || 0));
        if (dashboardIsUsage(log)) item.usage += amount;
        else item.deposit += amount;
      });

      let list = Array.from(rows.values());
      if (list.length > 31) {
        const grouped = [];
        for (let i = 0; i < list.length; i += 7) {
          const chunk = list.slice(i, i + 7);
          grouped.push({
            key: chunk[0].key,
            label: chunk[0].label,
            deposit: chunk.reduce((sum, item) => sum + item.deposit, 0),
            usage: chunk.reduce((sum, item) => sum + item.usage, 0),
          });
        }
        list = grouped;
      }
      return list;
    }

    function dashboardTrendChart(metrics) {
      const data = dashboardBuildTrend(metrics);
      if (!data.length) return '<div class="dashboard-empty">此區間沒有可繪製資料</div>';

      const width = 720;
      const height = 250;
      const left = 44;
      const right = 14;
      const top = 18;
      const bottom = 32;
      const plotW = width - left - right;
      const plotH = height - top - bottom;
      const maxValue = Math.max(1, ...data.flatMap((item) => [item.deposit, item.usage]));
      const x = (index) => left + (data.length === 1 ? plotW / 2 : index * plotW / (data.length - 1));
      const y = (value) => top + plotH - value / maxValue * plotH;
      const points = (key) => data.map((item, index) => `${x(index).toFixed(1)},${y(item[key]).toFixed(1)}`).join(' ');
      const areaPoints = `${left},${top + plotH} ${points('deposit')} ${left + plotW},${top + plotH}`;
      const grid = [0, .25, .5, .75, 1].map((ratio) => {
        const gy = top + plotH - ratio * plotH;
        return `<line class="dashboard-chart-grid" x1="${left}" x2="${left + plotW}" y1="${gy}" y2="${gy}" />
          <text class="dashboard-chart-label" x="${left - 7}" y="${gy + 3}" text-anchor="end">${money(Math.round(maxValue * ratio))}</text>`;
      }).join('');
      const labelStep = Math.max(1, Math.ceil(data.length / 7));
      const labels = data.map((item, index) => index % labelStep === 0 || index === data.length - 1
        ? `<text class="dashboard-chart-label" x="${x(index)}" y="${height - 7}" text-anchor="middle">${dashboardEscapeAttr(item.label)}</text>`
        : '').join('');
      const depositDots = data.map((item, index) => `<circle class="dashboard-chart-dot-deposit" cx="${x(index)}" cy="${y(item.deposit)}" r="3"><title>${dashboardEscapeAttr(item.label)} 儲值 ${dashboardMoney(item.deposit)}</title></circle>`).join('');
      const usageDots = data.map((item, index) => `<circle class="dashboard-chart-dot-usage" cx="${x(index)}" cy="${y(item.usage)}" r="3"><title>${dashboardEscapeAttr(item.label)} 使用 ${dashboardMoney(item.usage)}</title></circle>`).join('');

      return `<div class="dashboard-chart-wrap">
        <svg class="dashboard-chart-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" role="img" aria-label="每日儲值與使用趨勢">
          ${grid}
          <polygon class="dashboard-chart-area" points="${areaPoints}" />
          <polyline class="dashboard-chart-deposit" points="${points('deposit')}" />
          <polyline class="dashboard-chart-usage" points="${points('usage')}" />
          ${depositDots}${usageDots}${labels}
        </svg>
        <div class="dashboard-legend">
          <span><i style="background:#4d927d"></i>儲值</span>
          <span><i style="background:#b99b73"></i>使用</span>
        </div>
      </div>`;
    }

    function dashboardMixChart(metrics) {
      const deposit = Number(metrics.depositTotal || 0);
      const usage = Number(metrics.usageTotal || 0);
      const total = deposit + usage;
      const depositPct = total > 0 ? deposit / total * 100 : 50;
      const usagePct = total > 0 ? usage / total * 100 : 50;
      const gradient = total > 0
        ? `conic-gradient(#4d927d 0 ${depositPct}%, #c8ad84 ${depositPct}% 100%)`
        : 'conic-gradient(#e7ece9 0 100%)';

      return `<div class="dashboard-donut-layout">
        <div class="dashboard-donut" style="background:${gradient}">
          <div class="dashboard-donut-center">${money(metrics.logs.length)}<small>交易筆數</small></div>
        </div>
        <div class="dashboard-mix-list">
          <div class="dashboard-mix-row"><i class="dashboard-mix-dot" style="background:#4d927d"></i><span class="dashboard-mix-label">儲值占比</span><span class="dashboard-mix-value">${depositPct.toFixed(1)}%</span></div>
          <div class="dashboard-mix-row"><i class="dashboard-mix-dot" style="background:#c8ad84"></i><span class="dashboard-mix-label">使用占比</span><span class="dashboard-mix-value">${usagePct.toFixed(1)}%</span></div>
          <div class="dashboard-mix-row"><i class="dashboard-mix-dot" style="background:#b8d4ca"></i><span class="dashboard-mix-label">交易會員</span><span class="dashboard-mix-value">${money(metrics.activeMembers.size)} 位</span></div>
          <div class="dashboard-mix-row"><i class="dashboard-mix-dot" style="background:#ddd3b8"></i><span class="dashboard-mix-label">平均單筆儲值</span><span class="dashboard-mix-value">${metrics.depositLogs.length ? dashboardMoney(metrics.depositTotal / metrics.depositLogs.length) : '$0'}</span></div>
        </div>
      </div>`;
    }

    function dashboardTopBars(rows, key, emptyText) {
      const list = (rows || []).slice(0, 6);
      if (!list.length) return `<div class="dashboard-empty">${escapeHtml(emptyText)}</div>`;
      const maxValue = Math.max(1, ...list.map((row) => Number(row[key] || 0)));
      return `<div class="dashboard-bars">${list.map((row) => {
        const value = Number(row[key] || 0);
        const pct = Math.max(2, value / maxValue * 100);
        return `<div class="dashboard-bar-row">
          <div class="dashboard-bar-meta"><span class="dashboard-bar-name">${escapeHtml(row.displayName || row.memberId || '未命名會員')}</span><span class="dashboard-bar-value">${dashboardMoney(value)}</span></div>
          <div class="dashboard-bar-track"><div class="dashboard-bar-fill" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}</div>`;
    }

    function dashboardBalanceSegments(metrics) {
      const segments = [
        { label: '$0', test: (v) => v <= 0, color: '#d5ddd9' },
        { label: '$1–499', test: (v) => v > 0 && v < 500, color: '#b8d4ca' },
        { label: '$500–999', test: (v) => v >= 500 && v < 1000, color: '#91b8aa' },
        { label: '$1,000 以上', test: (v) => v >= 1000, color: '#4d927d' },
      ].map((segment) => ({
        ...segment,
        count: metrics.members.filter((member) => segment.test(Number(member.storedValue || 0))).length,
      }));
      const total = Math.max(1, metrics.members.length);
      return `<div class="dashboard-segments">${segments.map((segment) => {
        const pct = segment.count / total * 100;
        return `<div class="dashboard-segment-row">
          <div class="dashboard-segment-head"><span>${segment.label}</span><span>${money(segment.count)} 位・${pct.toFixed(1)}%</span></div>
          <div class="dashboard-segment-track"><div class="dashboard-segment-fill" style="width:${pct}%;background:${segment.color}"></div></div>
        </div>`;
      }).join('')}</div>`;
    }

    function dashboardAlertCards(metrics) {
      const net = metrics.depositTotal - metrics.usageTotal;
      const zeroBalance = metrics.members.filter((member) => Number(member.storedValue || 0) <= 0).length;
      const highBalance = metrics.members.filter((member) => Number(member.storedValue || 0) >= 3000).length;
      const inactive = metrics.members.filter((member) => {
        const date = dashboardParseDate(member.lastVisitAt);
        return date && (Date.now() - date.getTime()) > 30 * 86400000;

      const cards = [

    function normalizeMemberTagOptions(values) {
      const source =
        Array.isArray(values)
          ? values
          : [];

      const unique = [];

      source.forEach((value) => {
        const tag =
          String(value || '').trim();

        if (
          tag &&
          !unique.includes(tag)
        ) {
          unique.push(tag);
        }
      });

      return unique;
    }

    function setMemberTagOptions(values) {
      const normalized =
        normalizeMemberTagOptions(values);

      MEMBER_TAG_OPTIONS.splice(
        0,
        MEMBER_TAG_OPTIONS.length,
        '',
        ...normalized
      );

      state.memberTagOptionsLoaded = true;
    }

    async function loadMemberTagOptions() {
      try {
        const snapshot =
          await firebaseDb
            .collection('settings')
            .doc('memberTags')
            .get();

        if (
          snapshot.exists &&
          Array.isArray(
            snapshot.data()?.items
          )
        ) {
          setMemberTagOptions(
            snapshot.data().items
          );
        } else {
          setMemberTagOptions([
            'VIP',
            '老客',
            '新客',
            '常客',
          ]);

          await firebaseDb
            .collection('settings')
            .doc('memberTags')
            .set(
              {
                items:
                  MEMBER_TAG_OPTIONS
                    .filter(Boolean),

                updatedAt:
                  firebase.firestore
                    .FieldValue
                    .serverTimestamp(),

                updatedBy:
                  firebaseAuth
                    .currentUser
                    ?.uid || '',

                updatedByEmail:
                  firebaseAuth
                    .currentUser
                    ?.email || '',
              },
              {
                merge: true,
              }
            );
        }

        return MEMBER_TAG_OPTIONS;
      } catch (error) {
        console.error(
          'loadMemberTagOptions failed',
          error
        );

        setMemberTagOptions([
          'VIP',
          '老客',
          '新客',
          '常客',
        ]);

        return MEMBER_TAG_OPTIONS;
      }
    }

    async function saveMemberTagOptions(
      options
    ) {
      const normalized =
        normalizeMemberTagOptions(
          options
        );

      if (!normalized.length) {
        throw new Error(
          '至少需要保留一個標籤分類'
        );
      }

      await firebaseDb
        .collection('settings')
        .doc('memberTags')
        .set(
          {
            items: normalized,

            updatedAt:
              firebase.firestore
                .FieldValue
                .serverTimestamp(),

            updatedBy:
              firebaseAuth
                .currentUser
                ?.uid || '',

            updatedByEmail:
              firebaseAuth
                .currentUser
                ?.email || '',

            storeName:
              state.adminProfile
                ?.displayName ||
              state.adminProfile
                ?.storeName ||
              '',
          },
          {
            merge: true,
          }
        );

      setMemberTagOptions(normalized);

      refreshMemberTagControls();
    }

    function refreshMemberTagControls() {
      document
        .querySelectorAll(
          '.member-tag-select'
        )
        .forEach((select) => {
          const memberId =
            select.dataset.memberId;

          const member =
            state.members.find(
              (item) =>
                String(item.memberId) ===
                String(memberId)
            );

          const currentTag =
            String(
              member?.tags || ''
            )
              .split(',')[0]
              .trim();

          select.innerHTML =
            MEMBER_TAG_OPTIONS.map(
              (tag) => `
                <option
                  value="${escapeHtml(tag)}"
                  ${
                    tag === currentTag
                      ? 'selected'
                      : ''
                  }
                >
                  ${
                    tag
                      ? escapeHtml(tag)
                      : '無標籤'
                  }
                </option>
              `
            ).join('');
        });

      const membersTable =
        document.getElementById(
          'membersTable'
        );

      if (
        membersTable &&
        state.page === 'members'
      ) {
        membersTable.innerHTML =
          renderMembersTable(
            state.members
          );
      }
    }

      if (modal) {
        modal.remove();
      }
    }

      const container =
        document.getElementById(

        );

      if (!container) {
        return;
      }

      const tags =
        MEMBER_TAG_OPTIONS

                style="
                  font-weight:900;

    function showMemberTagManagerMessage(
      message,
      isError = false
    ) {
      const box =
        document.getElementById(
          'memberTagManagerMessage'
        );

      if (!box) {
        return;
      }

      box.className =
        'message show';

      box.style.background =
        isError
          ? '#fef2f2'
          : '#ecfdf5';

      box.style.color =
        isError
          ? '#991b1b'
          : '#166534';

      box.textContent = message;
    }

    async function addMemberTagOption() {
      const input =
        document.getElementById(
          'newMemberTagInput'
        );

      const newTag =
        String(input?.value || '')
          .trim();

      if (!newTag) {
        showMemberTagManagerMessage(
          '請輸入分類名稱',
          true
        );

        return;
      }

      const current =
        MEMBER_TAG_OPTIONS
          .filter(Boolean);

      if (current.includes(newTag)) {
        showMemberTagManagerMessage(
          '這個分類已經存在',
          true
        );

        return;
      }

      try {
        await saveMemberTagOptions([
          ...current,
          newTag,
        ]);

        if (input) {
          input.value = '';
        }

        renderMemberTagManagerRows();

        showMemberTagManagerMessage(
          `已新增分類：${newTag}`
        );
      } catch (error) {
        showMemberTagManagerMessage(
          error.message ||
          String(error),
          true
        );
      }
    }

    async function editMemberTagOption(
      index
    ) {
      const current =
        MEMBER_TAG_OPTIONS
          .filter(Boolean);

      const oldTag =
        current[index];

      if (!oldTag) {
        return;
      }

      const newTag =
        window.prompt(
          '請輸入新的分類名稱',
          oldTag
        );

      if (newTag === null) {
        return;
      }

      const normalized =
        String(newTag).trim();

      if (!normalized) {
        showMemberTagManagerMessage(
          '分類名稱不可空白',
          true
        );

        return;
      }

      if (
        normalized !== oldTag &&
        current.includes(normalized)
      ) {
        showMemberTagManagerMessage(
          '這個分類已經存在',
          true
        );

        return;
      }

      try {
        const updated =
          [...current];

        updated[index] = normalized;

        await saveMemberTagOptions(
          updated
        );

        const affectedMembers =
          state.members.filter(
            (member) =>
              String(member.tags || '')
                .split(',')[0]
                .trim() === oldTag
          );

        for (
          const member
          of affectedMembers
        ) {
          await api(
            'updateMemberTags',
            {
              memberId:
                member.memberId,

              tags: normalized,
            }
          );

          member.tags = normalized;
        }

        renderMemberTagManagerRows();

        showMemberTagManagerMessage(
          `已將「${oldTag}」改為「${normalized}」`
        );
      } catch (error) {
        showMemberTagManagerMessage(
          error.message ||
          String(error),
          true
        );
      }
    }

    async function deleteMemberTagOption(
      index
    ) {
      const current =
        MEMBER_TAG_OPTIONS
          .filter(Boolean);

      const target =
        current[index];

      if (!target) {
        return;
      }

      const affectedMembers =
        state.members.filter(
          (member) =>
            String(member.tags || '')
              .split(',')[0]
              .trim() === target
        );

      const confirmed =
        window.confirm(
          affectedMembers.length
            ? `「${target}」目前有 ${affectedMembers.length} 位會員使用。\n\n刪除後，這些會員會改成「無標籤」。確定刪除嗎？`
            : `確定刪除分類「${target}」嗎？`
        );

      if (!confirmed) {
        return;
      }

      try {
        const updated =
          current.filter(
            (_, itemIndex) =>
              itemIndex !== index
          );

        await saveMemberTagOptions(
          updated
        );

        for (
          const member
          of affectedMembers
        ) {
          await api(
            'updateMemberTags',
            {
              memberId:
                member.memberId,

              tags: '',
            }
          );

          member.tags = '';
        }

        renderMemberTagManagerRows();

        showMemberTagManagerMessage(
          `已刪除分類：${target}`
        );
      } catch (error) {
        showMemberTagManagerMessage(

    function normalizeMemberNumber(value) {
      const numberValue = Number(
        String(value ?? '')
          .replaceAll(',', '')
          .replaceAll('$', '')
          .trim()
      );

      return Number.isFinite(numberValue)
        ? numberValue
        : 0;
    }

    function toDateTimeLocalValue(value) {
      if (!value) {
        return '';
      }

      let date = null;

      if (
        value &&
        typeof value === 'object' &&
        typeof value.toDate === 'function'
      ) {
        date = value.toDate();
      } else {
        const raw = String(value).trim();

        if (!raw) {
          return '';
        }

        const parsed = new Date(
          raw.includes('T')
            ? raw
            : raw.replace(/-/g, '/')
        );

        if (!Number.isNaN(parsed.getTime())) {
          date = parsed;
        }
      }

      if (!date || Number.isNaN(date.getTime())) {
        return '';
      }

      const pad = (number) =>
        String(number).padStart(2, '0');

      return (
        date.getFullYear() +
        '-' +
        pad(date.getMonth() + 1) +
        '-' +
        pad(date.getDate()) +
        'T' +
        pad(date.getHours()) +
        ':' +
        pad(date.getMinutes())
      );
    }

    function toDateInputValue(value) {
      if (!value) {
        return '';
      }

      const dateTimeValue =
        toDateTimeLocalValue(value);

      if (dateTimeValue) {
        return dateTimeValue.slice(0, 10);
      }

      const raw = String(value).trim();

      const match = raw.match(
        /^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/
      );

      if (!match) {
        return '';
      }

      return [
        match[1],
        String(match[2]).padStart(2, '0'),
        String(match[3]).padStart(2, '0'),
      ].join('-');
    }
