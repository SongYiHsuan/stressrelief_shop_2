    async function findMemberDocumentReference(member) {
      const directDocumentId =
        member.lineUserId ||
        member.documentId ||
        member.firebaseDocumentId ||
        member.uid ||
        '';

      if (directDocumentId) {
        const directRef =
          firebaseDb
            .collection('members')
            .doc(String(directDocumentId));

        const directSnapshot =
          await directRef.get();

        if (directSnapshot.exists) {
          return {
            ref: directRef,
            snapshot: directSnapshot,
          };
        }
      }

      const memberId =
        String(member.memberId || '').trim();

      if (!memberId) {
        throw new Error(
          '會員缺少 memberId，無法定位 Firebase 文件'
        );
      }

      const querySnapshot =
        await firebaseDb
          .collection('members')
          .where('memberId', '==', memberId)
          .limit(2)
          .get();

      if (querySnapshot.empty) {
        throw new Error(
          'Firebase members 集合找不到此會員'
        );
      }

      if (querySnapshot.size > 1) {
        throw new Error(
          'Firebase 中有重複會員編號，請先整理重複資料'
        );
      }

      const snapshot =
        querySnapshot.docs[0];

      return {
        ref: snapshot.ref,
        snapshot,
      };
    }

    async function saveMemberEdit(originalMember) {
      const saveBtn =
        document.getElementById(
          'saveMemberEditBtn'
        );

      const cancelBtn =
        document.getElementById(
          'cancelMemberEditBtn'
        );

      const message =
        document.getElementById(
          'memberEditMessage'
        );

      try {
        const formValues =
          getMemberEditFormValues();

        if (!firebaseAuth.currentUser) {
          throw new Error(
            '管理員登入已過期，請重新登入'
          );
        }

        if (!state.adminProfile) {
          throw new Error(
            '找不到管理員權限資料'
          );
        }

        saveBtn.disabled = true;
        cancelBtn.disabled = true;
        saveBtn.textContent = '儲存中...';

        message.classList.remove('show');
        message.textContent = '';

        const located =
          await findMemberDocumentReference(
            originalMember
          );

        const memberRef = located.ref;

        const adminUser =
          firebaseAuth.currentUser;

        const adminEmail =
          adminUser.email || '';

        const adminUid =
          adminUser.uid || '';

        const storeName =
          state.adminProfile.displayName ||
          state.adminProfile.storeName ||
          '';

        const now =
          firebase.firestore.FieldValue
            .serverTimestamp();

        let updatedMemberData = null;

        await firebaseDb.runTransaction(
          async (transaction) => {
            const latestSnapshot =
              await transaction.get(memberRef);

            if (!latestSnapshot.exists) {
              throw new Error(
                '會員文件已不存在，請重新整理'
              );
            }

            const latest =
              latestSnapshot.data() || {};

            const beforeStoredValue =
              normalizeMemberNumber(
                latest.storedValue
              );

            const beforePoints =
              normalizeMemberNumber(
                latest.points ??
                latest.pointBalance ??
                0
              );

            const updateData = {
              displayName:
                formValues.displayName,

              realName:
                formValues.realName,

              name:
                formValues.realName,

              phone:
                formValues.phone,

              email:
                formValues.email,

              level:
                formValues.level,

              tags:
                formValues.tags,

              storedValue:
                formValues.storedValue,

              totalSpend:
                formValues.totalSpend,

              points:
                formValues.points,

              pointBalance:
                formValues.points,

              phoneVerified:
                formValues.phoneVerified,

              birthday:
                formValues.birthday,

              note:
                formValues.note,

              notes:
                formValues.note,

              updatedAt: now,

              updatedBy: adminUid,

              updatedByEmail:
                adminEmail,

              updatedStoreName:
                storeName,
            };

            if (formValues.lastVisitDate) {
              updateData.lastVisitAt =
                firebase.firestore.Timestamp
                  .fromDate(
                    formValues.lastVisitDate
                  );
            } else {
              updateData.lastVisitAt = null;
            }

            /*
             * 特別注意：
             * 不更新 lineUserId、memberId、barcodeValue，
             * 避免會員與歷史紀錄失去關聯。
             */
            transaction.update(
              memberRef,
              updateData
            );

            const storedValueDifference =
              formValues.storedValue -
              beforeStoredValue;

            if (storedValueDifference !== 0) {
              const walletLogRef =
                firebaseDb
                  .collection('walletLogs')
                  .doc();

              transaction.set(
                walletLogRef,
                {
                  logId:
                    walletLogRef.id,

                  memberDocumentId:
                    memberRef.id,

                  lineUserId:
                    latest.lineUserId ||
                    memberRef.id,

                  memberId:
                    latest.memberId ||
                    originalMember.memberId ||
                    '',

                  displayName:
                    formValues.displayName ||
                    latest.displayName ||
                    '',

                  type:
                    '後台調整',

                  amount:
                    storedValueDifference,

                  beforeStoredValue,

                  afterStoredValue:
                    formValues.storedValue,

                  payMethod:
                    '後台修改',

                  note:
                    '會員資料編輯調整儲值金',

                  operatorUid:
                    adminUid,

                  operatorEmail:
                    adminEmail,

                  staff:
                    adminEmail,

                  storeName,

                  createdAt:
                    now,
                }
              );
            }

            const pointsDifference =
              formValues.points -
              beforePoints;

            if (pointsDifference !== 0) {
              const pointLogRef =
                firebaseDb
                  .collection('pointLogs')
                  .doc();

              transaction.set(
                pointLogRef,
                {
                  logId:
                    pointLogRef.id,

                  memberDocumentId:
                    memberRef.id,

                  lineUserId:
                    latest.lineUserId ||
                    memberRef.id,

                  memberId:
                    latest.memberId ||
                    originalMember.memberId ||
                    '',

                  displayName:
                    formValues.displayName ||
                    latest.displayName ||
                    '',

                  type:
                    '後台調整',

                  points:
                    pointsDifference,

                  amount:
                    pointsDifference,

                  beforePoints,

                  afterPoints:
                    formValues.points,

                  note:
                    '會員資料編輯調整點數',

                  operatorUid:
                    adminUid,

                  operatorEmail:
                    adminEmail,

                  staff:
                    adminEmail,

                  storeName,

                  createdAt:
                    now,
                }
              );
            }

            const editLogRef =
              firebaseDb
                .collection('memberEditLogs')
                .doc();

            transaction.set(
              editLogRef,
              {
                logId:
                  editLogRef.id,

                memberDocumentId:
                  memberRef.id,

                lineUserId:
                  latest.lineUserId ||
                  memberRef.id,

                memberId:
                  latest.memberId ||
                  originalMember.memberId ||
                  '',

                displayName:
                  formValues.displayName ||
                  latest.displayName ||
                  '',

                operatorUid:
                  adminUid,

                operatorEmail:
                  adminEmail,

                storeName,

                before: {
                  displayName:
                    latest.displayName || '',

                  realName:
                    latest.realName ||
                    latest.name ||
                    '',

                  phone:
                    latest.phone || '',

                  email:
                    latest.email || '',

                  level:
                    latest.level || '',

                  tags:
                    latest.tags || '',

                  storedValue:
                    beforeStoredValue,

                  totalSpend:
                    normalizeMemberNumber(
                      latest.totalSpend
                    ),

                  points:
                    beforePoints,

                  phoneVerified:
                    latest.phoneVerified === true,

                  birthday:
                    latest.birthday || '',

                  note:
                    latest.note ||
                    latest.notes ||
                    '',
                },

                after: {
                  displayName:
                    formValues.displayName,

                  realName:
                    formValues.realName,

                  phone:
                    formValues.phone,

                  email:
                    formValues.email,

                  level:
                    formValues.level,

                  tags:
                    formValues.tags,

                  storedValue:
                    formValues.storedValue,

                  totalSpend:
                    formValues.totalSpend,

                  points:
                    formValues.points,

                  phoneVerified:
                    formValues.phoneVerified,

                  birthday:
                    formValues.birthday,

                  note:
                    formValues.note,
                },

                createdAt:
                  now,
              }
            );

            updatedMemberData = {
              ...latest,
              ...updateData,

              documentId:
                memberRef.id,

              lineUserId:
                latest.lineUserId ||
                memberRef.id,

              memberId:
                latest.memberId ||
                originalMember.memberId ||
                '',

              lastVisitAt:
                formValues.lastVisitDate
                  ? formValues.lastVisitDate
                      .toISOString()
                  : '',
            };
          }
        );

        state.members =
          state.members.map((member) => {
            if (
              String(member.memberId || '') ===
              String(
                originalMember.memberId || ''
              )
            ) {
              return {
                ...member,
                ...updatedMemberData,
              };
            }

            return member;
          });

        closeMemberEdit();

        if (state.page === 'members') {
          renderMembers();
        }

        alert('會員資料已更新完成');
      } catch (error) {
        console.error(
          'saveMemberEdit failed',
          error
        );

        if (message) {
          message.textContent =
            error.message ||
            String(error);

          message.classList.add('show');
        }
      } finally {
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.textContent =
            '儲存修改';
        }

        if (cancelBtn) {
          cancelBtn.disabled = false;
        }
      }
    }

            <thead>

                <th>等級</th>

                <th>累積消費</th>

    function renderBroadcast() {
      setTitle('發送內容', '對標 LINE 官方後台，可建立圖文訊息、優惠券並預覽');

      document.getElementById('page').innerHTML = `
        <div class="line-editor-grid">
          <div>
            <div class="panel">
              <h2 class="panel-title">訊息項目</h2>

              <div class="message-type-tabs">
                <button class="message-type-tab active" data-send-type="imageText">圖文訊息</button>
                <button class="message-type-tab" data-send-type="coupon">優惠券</button>
              </div>

              <input type="hidden" id="sendType" value="imageText" />

              <div class="form-row">
                <label id="sendTitleLabel">標題</label>
                <input id="sendTitle" placeholder="例如：本週會員限定活動" />
              </div>

              <div class="form-row">
                <label id="sendContentLabel">內容</label>
                <textarea id="sendContent" placeholder="輸入要發送給會員的內容"></textarea>
              </div>

              <div class="form-row">
                <label>圖片網址，可不填</label>
                <input id="sendImageUrl" placeholder="https://..." />
              </div>

              <div class="form-row" id="actionUrlRow">
                <label id="sendActionUrlLabel">按鈕連結</label>
                <input id="sendActionUrl" placeholder="https://..." />
              </div>

              <div class="form-row" id="buttonLabelRow">
                <label>按鈕文字</label>
                <input id="sendButtonLabel" placeholder="例如：立即查看" value="立即查看" />
              </div>

              <div class="form-grid" id="couponSettingRows" style="display:none;">
                <div class="form-row">
                  <label>折抵金額</label>
                  <input id="couponAmount" type="number" placeholder="例如 100" inputmode="numeric" />
                </div>

                <div class="form-row">
                  <label>開始日期</label>
                  <input id="couponStartDate" type="date" />
                </div>

                <div class="form-row">
                  <label>結束日期</label>
                  <input id="couponEndDate" type="date" />
                </div>
              </div>
            </div>

            <div class="panel">
              <h2 class="panel-title">預覽名單</h2>
              <div id="broadcastPreview" class="muted">尚未預覽。</div>
            </div>
          </div>

          <div class="phone-preview-wrap">
            <div class="panel">
              <h2 class="panel-title">手機預覽</h2>

              <div class="phone-preview">
                <div class="phone-preview-header">解憂藥局</div>
                <div class="phone-preview-body" id="linePreview"></div>
              </div>

              <div class="preview-note">
                預覽為近似 LINE 顯示效果，實際畫面會依 LINE App 版本略有差異。
              </div>
            </div>

            <div class="panel">
              <h2 class="panel-title">選擇條件</h2>

              <div class="form-grid broadcast-filter-grid">
                <div class="form-row">
                  <label>會員標籤</label>
                  <select id="filterTag">
                    <option value="">全部</option>
                    <option value="VIP">VIP</option>
                    <option value="新客">新客</option>
                    <option value="常客">常客</option>
                    <option value="老客">老客</option>
                  </select>
                </div>

                <div class="form-row">
                  <label>最低儲值金</label>
                  <input id="filterMinStoredValue" type="number" placeholder="例如 100" />
                </div>

                <div class="form-row">
                  <label>此日期後加入</label>
                  <input id="filterJoinedAfterDate" type="date" />
                </div>

                <div class="form-row">
                  <label>儲值金條件</label>
                  <select id="filterStoredValue">
                    <option value="">全部</option>
                    <option value="yes">有儲值餘額</option>
                    <option value="no">沒有儲值餘額</option>
                  </select>
                </div>
              </div>

              <div class="btn-row">
                <button class="btn secondary" id="previewBroadcastBtn">預覽人數</button>
                <button class="btn green" id="sendBroadcastBtn">確認發送</button>
              </div>

              <div id="broadcastMsg" class="message"></div>
            </div>
          </div>
        </div>
      `;

      const updatePreview = () => {
        const preview = document.getElementById('linePreview');
        if (!preview) return;

        const payload = getBroadcastPayload();
        const title = payload.title || getDefaultTitle(payload.sendType);
        const content = payload.content || getDefaultContent(payload.sendType);
        const imageUrl = payload.imageUrl;
        const buttonLabel = payload.buttonLabel || getDefaultButtonLabel(payload.sendType);

        preview.innerHTML = `
          <div class="line-bubble">
            <div class="line-bubble-img">
              ${
                imageUrl
                  ? `<img src="${escapeHtml(imageUrl)}" alt="">`
                  : `<span>${escapeHtml(getTypeLabel(payload.sendType))}</span>`
              }
            </div>

            <div class="line-bubble-content">
              <div class="line-bubble-title">${escapeHtml(title)}</div>
              <div class="line-bubble-text">${escapeHtml(content)}</div>
              <div class="line-bubble-button">${escapeHtml(buttonLabel)}</div>
            </div>
          </div>
        `;
      };

      const setBroadcastFieldVisibility = (type) => {
        const titleLabel = document.getElementById('sendTitleLabel');
        const contentLabel = document.getElementById('sendContentLabel');
        const actionUrlRow = document.getElementById('actionUrlRow');
        const actionUrlLabel = document.getElementById('sendActionUrlLabel');
        const buttonLabelRow = document.getElementById('buttonLabelRow');
        const couponSettingRows = document.getElementById('couponSettingRows');
        const actionUrlInput = document.getElementById('sendActionUrl');

        if (!titleLabel || !contentLabel) return;

        if (type === 'coupon') {
          titleLabel.textContent = '優惠券名稱';
          contentLabel.textContent = '優惠券說明';
          actionUrlRow.style.display = 'none';
          buttonLabelRow.style.display = 'none';
          couponSettingRows.style.display = 'grid';
          if (actionUrlInput) actionUrlInput.value = '';
        } else {
          titleLabel.textContent = '標題';
          contentLabel.textContent = '內容';
          actionUrlRow.style.display = '';
          actionUrlLabel.textContent = '按鈕連結，可不填';
          actionUrlInput.placeholder = 'https://...';
          buttonLabelRow.style.display = '';
          couponSettingRows.style.display = 'none';
        }
      };

      document.querySelectorAll('.message-type-tab').forEach((btn) => {
        btn.onclick = () => {
          document.querySelectorAll('.message-type-tab').forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');

          const type = btn.dataset.sendType;
          document.getElementById('sendType').value = type;

          document.getElementById('sendTitle').value = getDefaultTitle(type);
          document.getElementById('sendContent').value = getDefaultContent(type);
          document.getElementById('sendButtonLabel').value = getDefaultButtonLabel(type);

          setBroadcastFieldVisibility(type);
          updatePreview();
        };
      });

      ['sendTitle', 'sendContent', 'sendImageUrl', 'sendActionUrl', 'sendButtonLabel', 'couponAmount', 'couponStartDate', 'couponEndDate'].forEach((id) => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener('input', updatePreview);
        }
      });

      document.getElementById('previewBroadcastBtn').onclick = async () => {
        const payload = getBroadcastPayload();
        const btn = document.getElementById('previewBroadcastBtn');
        const oldText = btn.textContent;
        const previewEl = document.getElementById('broadcastPreview');

        try {
          btn.disabled = true;
          btn.textContent = '查詢中...';
          btn.style.opacity = '0.72';

          if (previewEl) {
            previewEl.innerHTML = '<div class="muted">查詢中...</div>';
          }

          const data = await api('previewBroadcast', payload);

          if (!data.previewId) {
            throw new Error('後端未回傳預覽名單編號');
          }

          state.broadcastPreviewId = data.previewId;
          state.broadcastPreviewCount = Number(data.count || 0);

          const sendBtn =
            document.getElementById('sendBroadcastBtn');

          if (sendBtn) {
            sendBtn.disabled = false;
            sendBtn.title = '';
          }

          showMessage(
            'broadcastMsg',
            '符合條件會員：' +
              data.count +
              ' 人。正式發送將只限此預覽名單。'
          );

          if (previewEl) {
            previewEl.innerHTML =
              renderMembersTable(
                normalizeMemberList(data.members)
              );
          }
        } catch (err) {
          showMessage('broadcastMsg', err.message || String(err));
        } finally {
          btn.disabled = false;
          btn.textContent = oldText;
          btn.style.opacity = '';
        }
      };

      document.getElementById('sendBroadcastBtn').onclick = async () => {
        const payload = getBroadcastPayload();

        if (!state.broadcastPreviewId) {
          showMessage(
            'broadcastMsg',
            '請先按「預覽人數」，確認發送名單後才能發送。'
          );
          return;
        }

        payload.previewId =
          state.broadcastPreviewId;

        if (!payload.title && !payload.content) {
          showMessage('broadcastMsg', '請至少輸入標題或內容。');
          return;
        }

        const btn = document.getElementById('sendBroadcastBtn');
        const oldText = btn.textContent;

        try {
          btn.disabled = true;
          btn.textContent = '發送中...';
          btn.style.opacity = '0.72';

          const data = await api('sendBroadcast', payload);

          state.broadcastPreviewId = '';
          state.broadcastPreviewCount = 0;

          showMessage(
            'broadcastMsg',
            '已送出發送任務，成功發送：' +
              data.sentCount +
              ' 人'
          );

          const previewEl =
            document.getElementById('broadcastPreview');

          if (previewEl) {
            previewEl.innerHTML =
              '<div class="muted">已完成發送。再次發送前請重新預覽名單。</div>';
          }

          refreshAllAdminData();
        } catch (err) {
          showMessage('broadcastMsg', err.message || String(err));
        } finally {
          btn.disabled = false;
          btn.textContent = oldText;
          btn.style.opacity = '';
        }
      };

      [
        'filterTag',
        'filterMinStoredValue',
        'filterJoinedAfterDate',
        'filterStoredValue',
      ].forEach((id) => {
        const element =
          document.getElementById(id);

        if (!element) {
          return;
        }

        element.addEventListener(
          'input',
          invalidateBroadcastPreview
        );

        element.addEventListener(
          'change',
          invalidateBroadcastPreview
        );
      });

      const initialSendBtn =
        document.getElementById('sendBroadcastBtn');

      if (initialSendBtn) {
        initialSendBtn.disabled = true;
        initialSendBtn.title =
          '請先預覽發送名單';
      }

      document.getElementById('sendTitle').value = getDefaultTitle('imageText');
      document.getElementById('sendContent').value = getDefaultContent('imageText');
      document.getElementById('sendButtonLabel').value = getDefaultButtonLabel('imageText');
      setBroadcastFieldVisibility('imageText');
      updatePreview();
    }

    function invalidateBroadcastPreview() {
      state.broadcastPreviewId = '';
      state.broadcastPreviewCount = 0;

      const sendBtn =
        document.getElementById('sendBroadcastBtn');

      if (sendBtn) {
        sendBtn.disabled = true;
        sendBtn.title =
          '請先重新預覽發送名單';
      }

      const previewEl =
        document.getElementById('broadcastPreview');

      if (previewEl) {
        previewEl.innerHTML =
          '<div class="muted">篩選條件已變更，請重新預覽名單。</div>';
      }

      const msg =
        document.getElementById('broadcastMsg');

      if (msg) {
        msg.textContent =
          '篩選條件已變更，請重新預覽名單。';

        msg.classList.add('show');
      }
    }


    function getTypeLabel(type) {
      if (type === 'coupon') return '優惠券';
      return '圖文訊息';
    }

    function getDefaultTitle(type) {
      if (type === 'coupon') return '解憂藥局優惠券';
      return '解憂藥局會員通知';
    }

    function getDefaultContent(type) {
      if (type === 'coupon') return '點擊下方按鈕查看本次優惠券。';
      return '這是一則會員專屬圖文訊息。';
    }

    function getDefaultButtonLabel(type) {
      if (type === 'coupon') return '立即領取優惠券';
      return '查看詳情';
    }

    function getBroadcastPayload() {
      return {
        sendType: document.getElementById('sendType').value,
        title: document.getElementById('sendTitle').value.trim(),
        content: document.getElementById('sendContent').value.trim(),
        imageUrl: document.getElementById('sendImageUrl').value.trim(),
        actionUrl: document.getElementById('sendActionUrl').value.trim(),
        buttonLabel: document.getElementById('sendButtonLabel').value.trim(),
        couponAmount: document.getElementById('couponAmount') ? document.getElementById('couponAmount').value : '',
        couponStartDate: document.getElementById('couponStartDate') ? document.getElementById('couponStartDate').value : '',
        couponEndDate: document.getElementById('couponEndDate') ? document.getElementById('couponEndDate').value : '',
        level: '',
        tag: document.getElementById('filterTag').value,
        minStoredValue: document.getElementById('filterMinStoredValue').value,
        joinedAfterDate: document.getElementById('filterJoinedAfterDate').value,
        hasStoredValue: document.getElementById('filterStoredValue').value,
      };
    }







    async function findMemberFromInput(inputId, msgId, resultId) {
      const input = document.getElementById(inputId);
      const keyword = input.value.trim();

      if (!keyword) {
        showMessage(msgId, '請輸入會員編號、電話或姓名。');
        return;
      }

      const loadingId = inputId === 'scanKeyword' ? 'scanQueryLoading' : 'walletQueryLoading';
      const loadingEl = document.getElementById(loadingId);
      const msgEl = document.getElementById(msgId);

      if (loadingEl) {
        loadingEl.classList.add('show');
      }

      if (msgEl) {
        msgEl.textContent = '';
        msgEl.classList.remove('show');
      }

      try {
        const data = await api('findMember', {
          keyword,
        });

        state.selectedMember = data.member;

        document.getElementById(resultId).innerHTML = renderSelectedMember(data.member);

        if (input) {
          input.select();
        }
      } catch (err) {
        state.selectedMember = null;
        document.getElementById(resultId).innerHTML = '<div class="muted">找不到會員。</div>';
        showMessage(msgId, err.message || String(err));
      } finally {
        if (loadingEl) {
          loadingEl.classList.remove('show');
        }
      }
    }

    function renderWallet() {
      setTitle('儲值 / 使用', '查詢會員後，處理會員儲值金');

      document.getElementById('page').innerHTML = `
        <div class="grid-2">
          <div>
            <div class="panel">
              <h2 class="panel-title">查詢會員</h2>

              <div class="form-row">
                <label>會員編號 / QR Code 內容 / 電話 / 姓名</label>
                <input
                  id="walletKeyword"
                  placeholder="掃描會員 QR Code 或輸入 XYYJ-C43A0EA9"
                  value="${escapeHtml(state.selectedMember?.memberId || '')}"
                  autocomplete="off"
                  autofocus
                />
              </div>

              <div class="btn-row">
                <button class="btn green" id="findWalletMemberBtn">查詢會員</button>
                <span class="query-loading" id="walletQueryLoading">查詢中...</span>
              </div>

              <div id="walletMsg" class="message"></div>
            </div>

            <div class="panel">
              <h2 class="panel-title">會員資訊</h2>
              <div id="walletMemberResult">
                ${state.selectedMember ? renderSelectedMember(state.selectedMember) : '<div class="muted">尚未選擇會員。掃碼或查詢後，會員完整資料會顯示在這裡。</div>'}
              </div>
            </div>
          </div>

          <div class="panel">
            <h2 class="panel-title">儲值金處理</h2>

            <div class="form-grid">
              <div class="form-row">
                <label>操作類型</label>
                <select id="walletType">
                  <option value="add">儲值</option>
                  <option value="use">使用</option>
                </select>
              </div>

              <div class="form-row">
                <label>金額</label>
                <input id="walletAmount" type="number" placeholder="例如 500" inputmode="numeric" />
              </div>

              <div class="form-row">
                <label>付款方式</label>
                <select id="payMethod">
                  <option value="">不指定</option>
                  <option value="現金">現金</option>
                  <option value="轉帳">轉帳</option>
                  <option value="刷卡">刷卡</option>
                  <option value="Line Pay">Line Pay</option>
                </select>
              </div>

              <div class="form-row">
                <label>店員</label>
                <input id="staffName" placeholder="例如 店員A" />
              </div>
            </div>

            <div class="form-row">
              <label>備註</label>
              <input id="walletNote" placeholder="例如 現金儲值 / 消費折抵 / 退款調整" />
            </div>

            <div class="btn-row">
              <button class="btn green" id="submitWalletBtn">確認送出</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById('findWalletMemberBtn').onclick = () => {
        findMemberFromInput('walletKeyword', 'walletMsg', 'walletMemberResult');
      };

      const walletKeywordInput = document.getElementById('walletKeyword');

      if (walletKeywordInput) {
        walletKeywordInput.focus();

        walletKeywordInput.addEventListener('keydown', function (event) {
          if (event.key === 'Enter') {
            event.preventDefault();
            findMemberFromInput('walletKeyword', 'walletMsg', 'walletMemberResult');
          }
        });

        walletKeywordInput.addEventListener('input', function () {
          clearTimeout(walletKeywordInput._scanTimer);

          walletKeywordInput._scanTimer = setTimeout(function () {
            const value = walletKeywordInput.value.trim();

            if (value.length >= 8) {
              findMemberFromInput('walletKeyword', 'walletMsg', 'walletMemberResult');
            }
          }, 450);
        });
      }

      function syncWalletPayMethod() {
        const walletType = document.getElementById('walletType');
        const payMethod = document.getElementById('payMethod');

        if (!walletType || !payMethod) {
          return;
        }

        if (walletType.value === 'use') {
          payMethod.value = '儲值金';
          payMethod.disabled = true;
        } else {
          payMethod.disabled = false;

          if (payMethod.value === '儲值金') {
            payMethod.value = '';
          }
        }
      }

      document.getElementById('walletType').onchange = syncWalletPayMethod;
      syncWalletPayMethod();

      document.getElementById('submitWalletBtn').onclick = submitWallet;
    }

    async function submitWallet() {
      const msgId = document.getElementById('walletMsg') ? 'walletMsg' : 'scanMsg';
      const submitBtn = document.getElementById('submitWalletBtn');
      const originalText = submitBtn ? submitBtn.textContent : '確認送出';

      if (!state.selectedMember) {
        showMessage(msgId, '請先掃碼或查詢會員。');
        return;
      }

      const type = document.getElementById('walletType').value;
      const rawAmount = Number(document.getElementById('walletAmount').value || 0);

      if (!rawAmount || rawAmount <= 0) {
        showMessage(msgId, '請輸入正確金額。');
        return;
      }

      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = '送出中...';
        submitBtn.style.opacity = '0.72';
        submitBtn.style.cursor = 'not-allowed';
      }

      const amount = type === 'use' ? -rawAmount : rawAmount;

      const payload = {
        memberId: state.selectedMember.memberId,
        barcodeValue: state.selectedMember.barcodeValue,
        amount,
        payMethod: type === 'use' ? '儲值金' : document.getElementById('payMethod').value,
        staff: document.getElementById('staffName').value.trim(),
        note: document.getElementById('walletNote').value.trim(),
      };

      try {
        const data = await api('adjustStoredValue', payload);

        state.selectedMember = data.member;

        const resultHtml = renderSelectedMember(data.member);

        const scanResult = document.getElementById('scanMemberResult');
        if (scanResult) {
          scanResult.innerHTML = resultHtml;
        }

        const walletResult = document.getElementById('walletMemberResult');
        if (walletResult) {
          walletResult.innerHTML = resultHtml;
        }

        document.getElementById('walletAmount').value = '';
        document.getElementById('walletNote').value = '';

        showMessage(
          msgId,
          '已完成更新。\n目前儲值金：$' + money(data.member.storedValue)
        );
      } catch (err) {
        showMessage(msgId, err.message || String(err));
      } finally {
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          submitBtn.style.opacity = '';
          submitBtn.style.cursor = '';
        }
      }
    }

    function renderLogs() {
      setTitle('儲值金紀錄', '記錄每次儲值金儲值與使用');

      const paint = () => {
        document.getElementById('page').innerHTML = `
          <div class="panel">
            <h2 class="panel-title">儲值金紀錄</h2>
            ${renderWalletLogsTable(state.walletLogs)}
          </div>
        `;
      };

      paint();

      api('getLogs')
        .then((data) => {
          state.pointLogs = data.pointLogs || [];
          state.walletLogs = data.walletLogs || [];

          if (state.page === 'logs') {
            paint();
          }
        })
        .catch((err) => {
          if (state.page === 'logs') {
            document.getElementById('page').innerHTML = `
              <div class="panel">
                <h2 class="panel-title">讀取失敗</h2>
                <div class="message show">${escapeHtml(err.message || String(err))}</div>
              </div>
            `;
          }
        });
    }

    function renderPointLogsTable(list) {
      if (!list.length) {
        return `<div class="muted">目前沒有儲值金紀錄。</div>`;
      }

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>時間</th>
                <th>會員</th>
                <th>類型</th>
                <th>異動儲值金</th>
                <th>異動前</th>
                <th>異動後</th>
                <th>店員</th>
                <th>備註</th>
              </tr>
            </thead>
            <tbody>
              ${list.map((l) => `
                <tr>
                  <td>${escapeHtml(l.createdAt)}</td>
                  <td>
                    <div class="member-name">${escapeHtml(l.displayName)}</div>
                    <div class="muted">${escapeHtml(l.memberId)}</div>
                  </td>
                  <td><span class="tag ${Number(l.points) >= 0 ? 'green' : 'red'}">${escapeHtml(l.type)}</span></td>
                  <td>${money(l.points)}</td>
                  <td>${money(l.beforePoints)}</td>
                  <td>${money(l.afterPoints)}</td>
                  <td>${escapeHtml(l.staff || '')}</td>
                  <td>${escapeHtml(l.note || '')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderWalletLogsTable(list) {
      if (!list.length) {
        return `<div class="muted">目前沒有儲值金紀錄。</div>`;
      }

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>時間</th>
                <th>會員</th>
                <th>類型</th>
                <th>金額</th>
                <th>異動前</th>
                <th>異動後</th>
                <th>付款方式</th>
                <th>店員</th>
                <th>備註</th>
                <th>店別</th>
              </tr>
            </thead>
            <tbody>
              ${list.map((l) => {
                const amount = Number(l.amount || 0);
                const storeName =
                  l.storeName ||
                  l.staff ||
                  '';

                return `
                  <tr>
                    <td>${escapeHtml(formatAdminDateTime(l.createdAt) || l.createdAt || '')}</td>
                    <td>
                      <div class="member-name">${escapeHtml(l.displayName || '')}</div>
                      <div class="muted">${escapeHtml(l.memberId || '')}</div>
                    </td>
                    <td>
                      <span class="tag ${amount >= 0 ? 'green' : 'red'}">
                        ${escapeHtml(l.type || (amount >= 0 ? '儲值' : '使用'))}
                      </span>
                    </td>
                    <td>${amount < 0 ? '-' : ''}$${money(Math.abs(amount))}</td>
                    <td>$${money(l.beforeStoredValue)}</td>
                    <td>$${money(l.afterStoredValue)}</td>
                    <td>${escapeHtml(l.payMethod || '')}</td>
                    <td>${escapeHtml(l.operatorEmail || l.staff || '')}</td>
                    <td>${escapeHtml(l.note || '')}</td>
                    <td>
                      <span class="tag">${escapeHtml(storeName || '未記錄')}</span>
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    document.querySelectorAll('.nav button').forEach((btn) => {
      btn.onclick = () => {
        setPage(btn.dataset.page);
      };
    });

    applyFlatSidebarIcons();
    initAdminAuth();
  
    // adminRefreshBtn clicked by delegation
    document.addEventListener('click', function (event) {
      const btn = event.target.closest && event.target.closest('#adminRefreshBtn');

      if (!btn) {
        return;
      }

      refreshAllAdminData();
    });

</script>
</body>
</html>
